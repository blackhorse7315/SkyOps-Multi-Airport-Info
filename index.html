<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyOps-Pro | Multi Aerodrome Information</title>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1EnYWeYpuUa9qZvVDTKpdNK1wY4YnDs9x">
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1EnYWeYpuUa9qZvVDTKpdNK1wY4YnDs9x">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href='data:application/json,{"name":"SkyOps-Pro","short_name":"SkyOps","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#3b82f6","icons":[{"src":"https://lh3.googleusercontent.com/d/1EnYWeYpuUa9qZvVDTKpdNK1wY4YnDs9x","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .copy-btn-small {
            @apply p-1.5 hover:bg-slate-700 rounded-md transition-all text-slate-400 hover:text-white flex items-center gap-1 text-[10px] font-bold uppercase;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex-grow">
        <!-- Header Section -->
        <header class="pt-8 pb-6 px-4 text-center">
            <div class="flex flex-col items-center justify-center gap-3 mb-2">
                <img src="https://lh3.googleusercontent.com/d/1EnYWeYpuUa9qZvVDTKpdNK1wY4YnDs9x" alt="Logo" class="w-16 h-16 object-contain rounded-xl shadow-lg shadow-blue-500/20" />
                <h1 class="text-4xl font-bold tracking-tight text-white">SkyOps<span class="text-blue-500">-Pro</span></h1>
            </div>
            <p class="text-slate-400 font-medium uppercase tracking-wider text-xs">Multi Aerodrome Information System</p>
        </header>

        <!-- Main Container -->
        <main class="max-w-4xl mx-auto px-4">
            
            <!-- Search & Time Section -->
            <section class="glass-card rounded-2xl p-6 mb-8 shadow-2xl">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase ml-1">Kode ICAO (Pisahkan Spasi)</label>
                        <input 
                            type="text" 
                            id="icaoInput" 
                            placeholder="Contoh: WIII WABB WARR" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all uppercase placeholder:normal-case"
                        >
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase ml-1">Dari (UTC)</label>
                        <input 
                            type="datetime-local" 
                            id="dateFrom" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        >
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase ml-1">Sampai (UTC)</label>
                        <input 
                            type="datetime-local" 
                            id="dateTo" 
                            class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                        >
                    </div>
                </div>

                <button 
                    onclick="fetchData()" 
                    id="fetchBtn"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20"
                >
                    <span id="btnText">Dapatkan Report Multi-Bandara</span>
                    <div id="btnLoader" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </section>

            <!-- Global Actions -->
            <div id="globalActions" class="hidden flex flex-col sm:flex-row gap-3 mb-6">
                <button onclick="copyAllReports()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    Copy All Reports
                </button>
                <button onclick="shareAllToWA()" class="flex-1 bg-green-600 hover:bg-green-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    Share All to WhatsApp
                </button>
            </div>

            <div id="resultsContainer" class="space-y-6">
                <div id="placeholder" class="text-center py-20 opacity-30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-20 h-20 mx-auto mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><path d="m16 12-4-4-4 4"/><path d="M12 8v8"/></svg>
                    <p class="text-xl">Masukkan data untuk memulai pencarian</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification -->
    <div id="notification" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 z-50 bg-blue-600 text-white px-6 py-3 rounded-full shadow-2xl transition-all">
        Berhasil disalin!
    </div>

    <!-- Footer Section -->
    <footer class="py-10 text-center border-t border-slate-800 bg-slate-900/50 mt-12">
        <p class="text-slate-200 font-semibold mb-1">SkyOps - Professional Aviation Apps</p>
        <p class="text-slate-500 text-sm">Copyright @2026</p>
    </footer>

    <script>
        const apiKey = ""; 
        const modelName = "gemini-2.5-flash-preview-09-2025";
        let currentReports = [];

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `self.addEventListener('fetch', (event) => { event.respondWith(fetch(event.request)); });`;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl);
            });
        }

        window.onload = () => {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(now.getDate() + 1);
            
            document.getElementById('dateFrom').value = now.toISOString().slice(0, 16);
            document.getElementById('dateTo').value = tomorrow.toISOString().slice(0, 16);
        };

        function showNotification(msg) {
            const el = document.getElementById('notification');
            el.innerText = msg;
            el.classList.remove('hidden');
            el.classList.add('animate-bounce');
            setTimeout(() => {
                el.classList.add('hidden');
                el.classList.remove('animate-bounce');
            }, 2500);
        }

        async function apiCall(prompt) {
            let retries = 0;
            const maxRetries = 5;
            while (retries < maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        reports: {
                                            type: "ARRAY",
                                            items: {
                                                type: "OBJECT",
                                                properties: {
                                                    icao: { type: "STRING" },
                                                    name: { type: "STRING" },
                                                    metar: { type: "STRING" },
                                                    taf: { type: "STRING" },
                                                    notam: { type: "STRING" }
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        })
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (error) {
                    retries++;
                    await new Promise(res => setTimeout(res, Math.pow(2, retries) * 500));
                }
            }
            throw new Error('Gagal menghubungi server.');
        }

        async function fetchData() {
            const input = document.getElementById('icaoInput').value.trim();
            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;

            if (!input) return;
            const codes = input.split(/\s+/).filter(c => c.length >= 3).map(c => c.toUpperCase());
            if (codes.length === 0) return;

            const btn = document.getElementById('fetchBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const container = document.getElementById('resultsContainer');
            const globalActions = document.getElementById('globalActions');
            
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            globalActions.classList.add('hidden');
            container.innerHTML = '<div class="flex justify-center py-20"><div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-12 w-12"></div></div>';

            const prompt = `Berikan informasi penerbangan terbaru untuk bandara: ${codes.join(', ')}. 
            Rentang waktu validitas: Dari ${from} UTC sampai ${to} UTC.
            Sertakan METAR (asli), TAF (asli), dan NOTAM relevan untuk periode tersebut. 
            Format respons: JSON { "reports": [ {icao, name, metar, taf, notam} ] }.`;

            try {
                const data = await apiCall(prompt);
                currentReports = data.reports;
                renderResults(data.reports);
                if (currentReports.length > 0) globalActions.classList.remove('hidden');
            } catch (error) {
                container.innerHTML = `<div class="bg-red-900/20 border border-red-500/50 p-6 rounded-xl text-center text-red-200 font-bold">${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }

        function formatDateTimeUTC(dateStr) {
            if(!dateStr) return "N/A";
            const d = new Date(dateStr);
            const day = String(d.getUTCDate()).padStart(2, '0');
            const month = String(d.getUTCMonth() + 1).padStart(2, '0');
            const year = d.getUTCFullYear();
            const hours = String(d.getUTCHours()).padStart(2, '0');
            const minutes = String(d.getUTCMinutes()).padStart(2, '0');
            return `${day}-${month}-${year}/${hours}:${minutes}UTC`;
        }

        /**
         * Formats a single airport report with WhatsApp styling.
         * @param {Object} report The report object
         * @param {Boolean} includeSignature Whether to include the final app signature
         */
        function formatFullReport(report, includeSignature = true) {
            const from = formatDateTimeUTC(document.getElementById('dateFrom').value);
            const to = formatDateTimeUTC(document.getElementById('dateTo').value);
            
            let text = `*METAR, TAF, NOTAM AVIATION REPORT*\n\n` +
                   `*PERIOD:*\n_${from}_ to _${to}_\n\n` +
                   `*ICAO: ${report.icao}*\n` +
                   `*AIRPORT:* _${report.name}_\n\n` +
                   `*METAR:*\n${report.metar}\n\n` +
                   `*TAF:*\n${report.taf}\n\n` +
                   `*NOTAM:*\n${report.notam}\n\n`;
            
            if (includeSignature) {
                text += `*_Generated by SkyOps Solution-Professional Aviation Apps_*`;
            }
            return text;
        }

        function renderResults(reports) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            reports.forEach((report) => {
                const card = document.createElement('div');
                card.className = "glass-card rounded-2xl overflow-hidden shadow-xl animate-fade-in mb-6 border-l-4 border-l-blue-500";
                
                card.innerHTML = `
                    <div class="bg-blue-600/10 px-6 py-4 flex justify-between items-center border-b border-slate-800">
                        <div>
                            <h2 class="text-xl font-bold uppercase">${report.icao}</h2>
                            <p class="text-xs text-slate-400 font-medium">${report.name}</p>
                        </div>
                        <button onclick="copySingleReport('${btoa(unescape(encodeURIComponent(JSON.stringify(report))))}')" class="p-2 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white" title="Copy Full Card">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        </button>
                    </div>
                    <div class="p-6 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <label class="text-xs font-bold text-blue-400 uppercase tracking-tighter">METAR</label>
                                    <button onclick="copyToClipboard(\`${report.metar}\`)" class="copy-btn-small">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                        Copy
                                    </button>
                                </div>
                                <div class="bg-slate-900/80 p-3 rounded-lg font-mono text-sm border border-slate-800 text-blue-100">${report.metar}</div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <label class="text-xs font-bold text-emerald-400 uppercase tracking-tighter">TAF</label>
                                    <button onclick="copyToClipboard(\`${report.taf}\`)" class="copy-btn-small">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                        Copy
                                    </button>
                                </div>
                                <div class="bg-slate-900/80 p-3 rounded-lg font-mono text-sm border border-slate-800 text-emerald-100">${report.taf}</div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-xs font-bold text-amber-400 uppercase tracking-tighter">NOTAM INFORMATION</label>
                                <button onclick="copyToClipboard(\`${report.notam}\`)" class="copy-btn-small">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                                    Copy
                                </button>
                            </div>
                            <div class="bg-slate-900/80 p-4 rounded-lg font-mono text-xs border border-slate-800 text-amber-100 whitespace-pre-line max-h-48 overflow-y-auto custom-scrollbar">
                                ${report.notam}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        /**
         * Copy individual card report (includes signature as it's a standalone copy)
         */
        function copySingleReport(encodedReport) {
            const report = JSON.parse(decodeURIComponent(escape(atob(encodedReport))));
            copyToClipboard(formatFullReport(report, true));
        }

        /**
         * Combine all reports into one.
         * Separator "====================" added between reports.
         * Signature ONLY at the very end of the total text.
         */
        function copyAllReports() {
            if (currentReports.length === 0) return;
            let allText = "";
            currentReports.forEach((r, idx) => {
                const isLast = (idx === currentReports.length - 1);
                allText += formatFullReport(r, isLast);
                if (!isLast) allText += "\n\n====================\n\n"; 
            });
            copyToClipboard(allText);
        }

        /**
         * Share all reports to WA.
         * Separator "====================" added between reports.
         * Signature ONLY at the very end of the total text.
         */
        function shareAllToWA() {
            if (currentReports.length === 0) return;
            let allText = "";
            currentReports.forEach((r, idx) => {
                const isLast = (idx === currentReports.length - 1);
                allText += formatFullReport(r, isLast);
                if (!isLast) allText += "\n\n====================\n\n";
            });
            const url = `https://wa.me/?text=${encodeURIComponent(allText)}`;
            window.open(url, '_blank');
        }

        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showNotification("Berhasil disalin!");
            } catch (err) {
                console.error('Error copy', err);
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
